name: CI

on:
  push:
  pull_request:

jobs:
  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync --locked
      - name: Compile check
        run: make check
